name: 提交一道面试题
description: 只提交问题，或同时提供自己的参考答案
title: "[题目] "
body:
  - type: markdown
    attributes:
      value: |
        感谢贡献。Issue 的标题、正文和附件提交后会公开。请确认内容可以公开，且不包含个人信息、公司机密或受保密协议约束的材料；隐私及安全问题请改用仓库的 Security 页面私密报告。

  - type: input
    id: question
    attributes:
      label: 面试题目
      placeholder: 例如：为什么 KV Cache 能加速推理？
    validations:
      required: true

  - type: dropdown
    id: submission_type
    attributes:
      label: 提交方式
      description: 不知道答案也没关系，可以先只提交问题。
      options:
        - 只有问题，答案待补充
        - 题目和参考答案一起提交
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: 分类
      options:
        - 数学基础
        - LLM 基础
        - NLP 与机器学习
        - 预训练与数据
        - 训练与对齐
        - 训练工程
        - 推理与部署
        - RAG
        - Agent
        - 多模态
        - 评测与安全
        - 工程实践
        - 系统设计
        - 其他 / 待分类
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: 难度
      options:
        - 待评估
        - 简单
        - 中等
        - 困难
    validations:
      required: true

  - type: textarea
    id: answer
    attributes:
      label: 口述答法与参考答案
      description: 可选。知道答案时，请直接写面试现场会说的话，再补核心知识、工程取舍和容易丢分的点；不知道时留空即可。不要编项目数据。

  - type: textarea
    id: followups
    attributes:
      label: 常见追问
      description: 每行填写一个追问，并在后面附上 1～2 句直接接法。

  - type: input
    id: source
    attributes:
      label: 参考来源
      description: 如果引用了资料，请提供公开可访问的链接。

  - type: textarea
    id: context
    attributes:
      label: 匿名背景（可选）
      description: 可以写岗位方向和轮次，例如“模型应用岗二面”。不要写公司、面试官、联系方式或会议安排。

  - type: checkboxes
    id: compliance
    attributes:
      label: 内容确认
      options:
        - label: 我有权公开这些内容，且内容不包含秘密、个人隐私或受保密协议约束的材料。
          required: true

