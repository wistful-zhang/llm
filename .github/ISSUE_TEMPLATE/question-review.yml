name: 校对题目或参考答案
description: 指出事实、来源或表达问题，并和社区一起讨论修改
title: "[题目校对] "
body:
  - type: markdown
    attributes:
      value: |
        校对提交后会公开，其他人可以在帖子下评论补充。请聚焦可验证的内容，不要填写真实面试官信息、公司内部材料或其他隐私。隐私或安全问题请改用仓库的 **Security** 页面私密报告。

  - type: input
    id: question_url
    attributes:
      label: 题目页面链接或标题
      description: 从题目页复制网址最容易定位；也可以直接填写完整标题。
      placeholder: https://…/questions/example/ 或题目完整标题
    validations:
      required: true

  - type: dropdown
    id: review_type
    attributes:
      label: 要校对什么？
      options:
        - 技术事实或公式
        - 参考答案的口述方式
        - 工程取舍或适用边界
        - 来源与引用
        - 追问与回答
        - 错别字、链接或页面展示
        - 为待解答题补充答案
    validations:
      required: true

  - type: textarea
    id: correction
    attributes:
      label: 具体问题与建议改法
      description: 请指出哪句话需要调整，并给出你建议的说法。只说“答案不对”很难继续处理。
      placeholder: 原文……；建议改为……；原因是……
    validations:
      required: true

  - type: input
    id: source
    attributes:
      label: 可核验依据（推荐）
      description: 优先提供论文、标准或官方文档链接，避免只引用二手总结。

  - type: checkboxes
    id: compliance
    attributes:
      label: 公开与授权确认
      options:
        - label: 我确认内容提交后会公开，已经移除个人隐私、公司机密和受保密协议约束的信息，并有权公开这次贡献。
          required: true
