name: Validate content and deploy public site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    name: Validate content
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate question content
        run: node scripts/validate-content.mjs

      - name: Test browser-side practice logic
        run: node --test tests/*.test.mjs

  build:
    name: Build public site
    if: (github.event.repository.visibility == 'public' && github.event.repository.has_pages == true) || vars.ENABLE_PAGES == 'true'
    needs: validate
    permissions:
      contents: read
      pages: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    name: Deploy public site
    if: github.event_name != 'pull_request' && ((github.event.repository.visibility == 'public' && github.event.repository.has_pages == true) || vars.ENABLE_PAGES == 'true')
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

