<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ page.description | default: site.description | escape }}">
    <meta name="theme-color" content="#101828">
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    <header class="site-header">
      <div class="container nav-wrap">
        <a class="brand" href="{{ '/' | relative_url }}" aria-label="返回首页">
          <span class="brand-mark">L</span>
          <span>{{ site.title }}</span>
        </a>
        <nav aria-label="主导航">
          <a href="{{ '/' | relative_url }}">题库</a>
          <a href="{{ '/about/' | relative_url }}">关于</a>
          <a class="admin-link" href="{{ '/manage/' | relative_url }}">管理题库</a>
        </nav>
      </div>
    </header>

    <main>{{ content }}</main>

    <footer class="site-footer">
      <div class="container footer-wrap">
        <span>持续学习，保持好奇。</span>
        <span>Built with GitHub Pages</span>
      </div>
    </footer>
    <script src="{{ '/assets/js/search.js' | relative_url }}" defer></script>
  </body>
</html>
