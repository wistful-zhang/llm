title: 大模型面经
description: 从基础原理到系统设计，持续整理高质量 LLM 面试题
lang: zh-CN
timezone: Asia/Shanghai
markdown: kramdown
permalink: pretty

collections:
  questions:
    output: true
    permalink: /questions/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: questions
    values:
      layout: question

exclude:
  - Gemfile
  - Gemfile.lock
  - _templates
