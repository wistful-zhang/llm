title: 大模型面经
description: 按考点整理的大模型面试题，包含参考说法、知识点和常见追问
lang: zh-CN
timezone: Asia/Shanghai
markdown: kramdown
kramdown:
  math_engine: mathjax
permalink: pretty

collections:
  questions:
    output: true
    permalink: /questions/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: ""
      type: questions
    values:
      layout: question

exclude:
  - Gemfile
  - Gemfile.lock
  - _templates
