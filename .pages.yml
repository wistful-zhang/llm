content:
  - name: questions
    label: 面试题与解答
    type: collection
    path: docs/_questions
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{hour}-{minute}-{second}-{primary}.md"
      field: false
    operations:
      rename: false
    commit:
      templates:
        create: "新增面试题：{filename}"
        update: "更新面试题：{filename}"
        delete: "删除面试题：{filename}"
    view:
      fields: [title, published, answer_status, review_status, category, date]
      primary: title
      sort: [date, title, review_status, category, difficulty]
      search: [title, source, category, tags, body]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 面试题目
        type: string
        required: true
        description: 刚面试完时先按记忆写下原问题，例如“为什么 KV Cache 能加速推理？”
        options:
          minlength: 2
          maxlength: 160

      - name: answer_status
        label: 答案状态
        type: select
        required: true
        default: pending
        description: 新题保持“待解答”即可先发布问题；答案整理完成后再改为“已完成”，届时才会显示答案并进入模拟面试。
        options:
          values:
            - name: pending
              label: 待解答（只显示问题）
            - name: complete
              label: 已完成（显示答案并进入模拟）

      - name: body
        label: 解答草稿区（可以留空）
        type: rich-text
        description: 答案状态为“待解答”时，半成品不会在阅读网站展示或进入模拟；但 Public 仓库中的源文件始终可见。可在题目页复制补答指令交给 Codex；手动写完后请把答案状态改为“已完成”。
        options:
          format: markdown
          switcher: false
          media: false

      - name: source
        label: 匿名来源 / 轮次（可留空）
        type: string
        description: 例如“应用岗 · 二面”。不要填写公司机密、面试官姓名、联系方式或受保密协议约束的信息。
        options:
          maxlength: 80

      - name: review_status
        label: 整理 / 复习状态
        type: select
        required: true
        default: 待整理
        description: 手动记录内容与复习进度；把答案状态改为“已完成”前，请改为“待复习”或“已掌握”。模拟面试中的自评只保存在浏览器，不会自动修改这里。
        options:
          values: [待整理, 待复习, 已掌握]

      - name: category
        label: 分类
        type: string
        required: true
        default: 待整理
        description: 只发布问题时可保留“待整理”；完成答案前可选数学基础、LLM 基础、NLP 与机器学习、预训练与数据、训练与对齐、训练工程、推理与部署、RAG、Agent、多模态、评测与安全、工程实践、系统设计，也可以输入自己的分类。
        options:
          maxlength: 30

      - name: difficulty
        label: 难度
        type: select
        required: true
        default: 待评估
        options:
          values: [待评估, 简单, 中等, 困难]

      - name: tags
        label: 标签
        type: string
        list: true
        description: 可选。每次填写一个标签，例如 Transformer、推理、应用岗、二面；请保持匿名。

      - name: date
        label: 面试 / 记录日期
        type: date
        required: true
        description: 新增时会自动使用本地当天日期，也可以手动调整。
        options:
          format: yyyy-MM-dd

      - name: published
        label: 最后确认：在阅读网站显示这道题
        type: boolean
        default: false
        description: 请在内容填写完成后最后决定。打开后，待解答状态只显示问题，已完成状态会同时显示答案并进入模拟。这个开关只控制阅读网站；Public 仓库里的所有源文件（包括关闭开关的草稿）本来就是公开的。

  - name: experiences
    label: 匿名公开面经
    type: collection
    path: docs/_experiences
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{primary}.md"
      field: false
    operations:
      rename: false
    commit:
      templates:
        create: "新增匿名面经：{filename}"
        update: "更新匿名面经：{filename}"
        delete: "删除匿名面经：{filename}"
    view:
      fields: [title, published, company_alias, role, interview_month]
      primary: title
      sort: [interview_month, title, role]
      search: [title, company_alias, role, round_summary, tags, body]
      default:
        sort: interview_month
        order: desc
    fields:
      - name: title
        label: 面经标题
        type: string
        required: true
        description: 使用匿名标题，例如“某互联网公司 · 大模型应用岗二面复盘”，不要写面试官或候选人姓名。
        options:
          minlength: 2
          maxlength: 120

      - name: company_alias
        label: 公司匿名代号
        type: string
        required: true
        default: 某公司
        description: 必须使用“某电商公司 A”“某模型创业公司”等匿名代号，不要填写真实公司名或可定位到具体团队的内部名称。
        options:
          minlength: 2
          maxlength: 40

      - name: role
        label: 岗位方向
        type: string
        required: true
        description: 例如“大模型算法工程师”“AI 应用开发”。避免填写能唯一识别个人的内部岗位编号。
        options:
          minlength: 2
          maxlength: 80

      - name: interview_month
        label: 面试月份
        type: string
        required: true
        description: 只填写 YYYY-MM，例如 2026-07；不要保存具体面试日期。
        pattern:
          regex: '^\d{4}-(0[1-9]|1[0-2])$'
          message: 请使用 YYYY-MM，例如 2026-07。
        options:
          minlength: 7
          maxlength: 7

      - name: round_summary
        label: 轮次概览
        type: string
        description: 例如“HR 初筛 + 两轮技术面”；不要填写面试官姓名或会议安排。
        options:
          maxlength: 120

      - name: tags
        label: 方向标签
        type: string
        list: true
        description: 可选，例如 RAG、推理部署、Agent、系统设计。

      - name: body
        label: 可公开的面经正文
        type: rich-text
        required: true
        description: 只整理你有权分享的题目、回答思路和经验。不要从本地复盘直接整段粘贴，不要加入图片或截图；保存前再次删除公司机密和个人信息。
        options:
          format: markdown
          switcher: false
          media: false

      - name: consent_to_publish
        label: 发布前确认：已匿名并且有权公开
        type: boolean
        default: false
        description: 请逐项确认正文和标题不含真实姓名、联系方式、会议链接、精确薪资、公司机密、受 NDA 约束内容，也没有直接粘贴本地私人复盘。自动校验发生在提交 GitHub 之后，不能替你保护 Public 仓库历史。

      - name: published
        label: 最后一步：在公开网站显示这篇面经
        type: boolean
        default: false
        description: 只在完成上面的匿名检查后打开。关闭时仅代表网站不展示；Public 仓库中的草稿源文件仍然公开。真正私密的经历请留在浏览器“面试记录”中，不要提交到这个集合。

  - name: site_settings
    label: 站点设置
    type: file
    path: docs/_data/settings.yml
    format: yaml
    operations:
      delete: false
    commit:
      templates:
        update: "更新站点设置"
    fields:
      - name: title
        label: 网站名称
        type: string
        required: true
        description: 显示在网页左上角和浏览器标题中，建议 2～20 个字。
        options:
          minlength: 2
          maxlength: 30

      - name: description
        label: 网站介绍
        type: text
        required: true
        description: 显示在首页主标题下方，用一句话说明题库内容。
        options:
          minlength: 10
          maxlength: 200

      - name: eyebrow
        label: 首页顶部小字（可留空）
        type: string
        description: 显示在首页标题上方，例如 LARGE MODEL INTERVIEW NOTES。
        options:
          maxlength: 60

      - name: hero_title
        label: 首页标题第一行
        type: string
        required: true
        description: 首页最大标题的第一部分，建议不超过 18 个字。
        options:
          minlength: 2
          maxlength: 30

      - name: hero_highlight
        label: 首页标题第二行
        type: string
        required: true
        description: 显示在第一行下方，可作为标题补充。
        options:
          minlength: 2
          maxlength: 30

      - name: theme
        label: 主题配色
        type: select
        required: true
        default: blue
        options:
          values:
            - name: violet
              label: 紫罗兰
            - name: blue
              label: 深海蓝
            - name: green
              label: 翡翠绿
            - name: rose
              label: 珊瑚红
            - name: amber
              label: 琥珀橙

      - name: footer
        label: 页脚文字
        type: string
        description: 显示在每个页面底部，可留空。
        options:
          maxlength: 80

actions:
  - name: validate-and-publish
    label: 检查内容并更新网站
    workflow: pages.yml
    ref: current
    cancelable: false
    confirm:
      title: 重新检查并更新网站？
      message: 当前分支会先运行检查；只有默认分支的 Public 仓库会继续更新网站，Private 仓库通常只检查。
      button: 开始检查

settings:
  hide: true
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "新增内容：{path}"
      update: "更新内容：{path}"
      delete: "删除内容：{path}"
      rename: "重命名内容：{oldPath} -> {newPath}"
