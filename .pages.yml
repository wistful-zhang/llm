content:
  - name: questions
    label: 面试题与解答
    type: collection
    path: docs/_questions
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{hour}-{minute}-{second}-{primary}.md"
      field: false
    operations:
      rename: false
    commit:
      templates:
        create: "新增面试题：{filename}"
        update: "更新面试题：{filename}"
        delete: "删除面试题：{filename}"
    view:
      fields: [title, published, review_status, category, date]
      primary: title
      sort: [date, title, review_status, category, difficulty]
      search: [title, source, category, tags, body]
      default:
        sort: date
        order: desc
    fields:
      - name: title
        label: 面试题目
        type: string
        required: true
        description: 刚面试完时先按记忆写下原问题，例如“为什么 KV Cache 能加速推理？”
        options:
          minlength: 2
          maxlength: 160

      - name: published
        label: 发布到阅读网站
        type: boolean
        default: false
        description: 默认关闭，先保存为待整理内容。注意：此开关只控制阅读网站是否显示；如果仓库是 Public，草稿源文件仍可在 GitHub 中被看到。

      - name: body
        label: 现场速记 / 口述答法与解答（可稍后补）
        type: rich-text
        description: 草稿阶段可以留空；发布前建议按“面试时怎么答、核心回答、展开说明、工程实践、常见追问、一句话复习、参考资料”整理。先写可直接口述的 60 秒回答，不要只堆分析资料。
        options:
          format: markdown
          switcher: false
          media: false

      - name: source
        label: 匿名来源 / 轮次（可留空）
        type: string
        description: 例如“应用岗 · 二面”。不要填写公司机密、面试官姓名、联系方式或受保密协议约束的信息。
        options:
          maxlength: 80

      - name: review_status
        label: 整理 / 复习状态
        type: select
        required: true
        default: 待整理
        description: 手动记录内容与复习进度；发布前改为“待复习”或“已掌握”。模拟面试中的自评只保存在浏览器，不会自动修改这里。
        options:
          values: [待整理, 待复习, 已掌握]

      - name: category
        label: 分类
        type: string
        required: true
        default: 待整理
        description: 速记时可保留“待整理”；发布前可选数学基础、LLM 基础、NLP 与机器学习、预训练与数据、训练与对齐、训练工程、推理与部署、RAG、Agent、多模态、评测与安全、工程实践、系统设计，也可以输入自己的分类。
        options:
          maxlength: 30

      - name: difficulty
        label: 难度
        type: select
        required: true
        default: 待评估
        options:
          values: [待评估, 简单, 中等, 困难]

      - name: tags
        label: 标签
        type: string
        list: true
        description: 可选。每次填写一个标签，例如 Transformer、推理、应用岗、二面；请保持匿名。

      - name: date
        label: 面试 / 记录日期
        type: date
        required: true
        description: 新增时会自动使用本地当天日期，也可以手动调整。
        options:
          format: yyyy-MM-dd

  - name: site_settings
    label: 站点设置
    type: file
    path: docs/_data/settings.yml
    format: yaml
    operations:
      delete: false
    commit:
      templates:
        update: "更新站点设置"
    fields:
      - name: title
        label: 网站名称
        type: string
        required: true
        description: 显示在网页左上角和浏览器标题中，建议 2～20 个字。
        options:
          minlength: 2
          maxlength: 30

      - name: description
        label: 网站介绍
        type: text
        required: true
        description: 显示在首页主标题下方，用一句话说明题库内容。
        options:
          minlength: 10
          maxlength: 200

      - name: eyebrow
        label: 首页顶部小字（可留空）
        type: string
        description: 显示在首页标题上方，例如 LARGE MODEL INTERVIEW NOTES。
        options:
          maxlength: 60

      - name: hero_title
        label: 首页标题第一行
        type: string
        required: true
        description: 首页最大标题的第一部分，建议不超过 18 个字。
        options:
          minlength: 2
          maxlength: 30

      - name: hero_highlight
        label: 首页彩色第二行
        type: string
        required: true
        description: 首页标题中使用主题色显示的第二部分。
        options:
          minlength: 2
          maxlength: 30

      - name: theme
        label: 主题配色
        type: select
        required: true
        default: violet
        options:
          values:
            - name: violet
              label: 紫罗兰
            - name: blue
              label: 深海蓝
            - name: green
              label: 翡翠绿
            - name: rose
              label: 珊瑚红
            - name: amber
              label: 琥珀橙

      - name: footer
        label: 页脚文字
        type: string
        description: 显示在每个页面底部，可留空。
        options:
          maxlength: 80

settings:
  hide: true
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "新增内容：{path}"
      update: "更新内容：{path}"
      delete: "删除内容：{path}"
      rename: "重命名内容：{oldPath} -> {newPath}"
